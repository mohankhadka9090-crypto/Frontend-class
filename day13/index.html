<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Number Design</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#111;
      font-family:Arial, sans-serif;
    }

    .container{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
    }

    .item{
      width:300px;
      text-align:center;
      position:relative;
    }

    .line{
      width:100%;
      height:14px;
      background:#63f5f2;
      margin-bottom:10px;
      border-radius:2px;
    }

    .text{
      color:white;
      font-size:32px;
      letter-spacing:15px;
      font-weight:bold;
    }
  </style>
</head>
<body>
'pp'
  <div class="container">

    <div class="item">
      <div class="line"></div>
      <div class="text">TEN</div>
    </div>

    <div class="item">
      <div class="line"></div>
      <div class="text">NINE</div>
    </div>

    <div class="item">
      <div class="line"></div>
      <div class="text">EIGHT</div>
    </div>

    <div class="item">
      <div class="line"></div>
      <div class="text">SEVEN</div>
    </div>

    <div class="item">
      <div class="line"></div>
      <div class="text">SIX</div>
    </div>

    <div class="item">
      <div class="line"></div>
      <div class="text">FIVE</div>
    </div>

    <div class="item">
      <div class="line"></div>
      <div class="text">FOUR</div>
    </div>

    <div class="item">
      <div class="line"></div>
      <div class="text">THREE</div>
    </div>

    <div class="item">
      <div class="line"></div>
      <div class="text">TWO</div>
    </div>

    <div class="item">
      <div class="line"></div>
      <div class="text">ONE</div>
    </div>

  </div>

</body>
</html>
