<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .black{
            background-color: black;
            width: 200px;
            height: 200px;
            position: relative;
            margin-top: 50px;
            z-index: 7;

        }
        .blue{
            background-color: blue;
            width: 200px;
            height: 200px;
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 6;

        }
    </style>
</head>
<body>
    <dev class="black"></dev>
    <dev class="blue"></dev>
    
</body>
</html>
