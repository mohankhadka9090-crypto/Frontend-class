<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p::first-line{}
        p::first-letter{}
        p.className::first-line{}
        p#id::first-letter{}

        /* Contant pseudo eements*/

        p::before{
            content: url("../..");

        }

        p::after{
            content: ulr();
        }

        ul.hello li::marker{
            color: blue;
        }

        ul li::selection{
            color: chartreuse;
        }

    </style>
</head>
<body>
    <ul>
        <li class="hello">helli</li>
        <li>hi</li>
        <li>hey</li>
    </ul>

    <ol>
        <li>my</li>
        <li>name</li>
        <li>is</li>
        <li>Mohan</li>
    </ol>
    
</body>
</html>
