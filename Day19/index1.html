<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID Card</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#eaf2f8;
}

/* CARD */
.card{
    width:420px;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

/* TITLE */
.title{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#1f618d;
    margin-bottom:20px;
}

/* MAIN PHOTO */
.main-photo{
    width:130px;
    height:130px;
    margin:auto;
    border-radius:50%;
    overflow:hidden;
    border:4px solid #3498db;
    transition:.4s;
}

.main-photo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.main-photo:hover{
    transform:translateY(-10px);
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* NAME */
.name{
    display:flex;
    justify-content:space-between;
    margin-top:15px;
    font-weight:bold;
}

hr{
    margin:15px 0;
}

/* OVERLAP GALLERY */
.gallery{
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:20px;
}

.gallery img{
    width:90px;
    height:90px;
    object-fit:cover;
    border-radius:10px;
    border:3px solid white;
    margin-left:-45px; /* overlap */
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    transition:0.4s;
    position:relative;
}

/* FIRST IMAGE START FROM LEFT */
.gallery img:first-child{
    margin-left:0;
}

/* STACK ORDER FIX (FIRST PHOTO ON TOP) */
.gallery img:nth-child(1){
    z-index:4;
}

.gallery img:nth-child(2){
    z-index:3;
}

.gallery img:nth-child(3){
    z-index:2;
}

.gallery img:nth-child(4){
    z-index:1;
}

/* HOVER EFFECT */
.gallery img:hover{
    transform:scale(1.2);
    z-index:100;
}

/* DETAILS */
.details p{
    margin:8px 0;
    padding-bottom:5px;
    border-bottom:1px solid #ddd;
}
</style>

</head>

<body>

<div class="card">

    <div class="title">ID CARD</div>

    <div class="main-photo">
        <img src="mohankhadka.png" alt="Profile">
    </div>

    <div class="name">
        <span>Last Name: Khadka</span>
        <span>First Name: Mohan</span>
    </div>

    <hr>

    <!-- OVERLAP GALLERY -->
    <div class="gallery">
        <img src="mohankhadka.png" alt="">
        <img src="khadkamohan.png" alt="">
        <img src="images.jpg" alt="">
        <img src="mohankhadka.png" alt="">
    </div>

    <div class="details">
        <p><b>ID:</b> 001</p>
        <p><b>Faculty:</b> BCA</p>
        <p><b>Semester:</b> 4th</p>
        <p><b>Email:</b> mohankhadka7477@gmail.com</p>
        <p><b>Phone:</b> 98XXXXXXXX</p>
    </div>

</div>

</body>
</html>
