<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID Card</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#eaf2f8;
}

.card{
    width:400px;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.title{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#1f618d;
    margin-bottom:20px;
}

.main-photo{
    width:130px;
    height:130px;
    margin:auto;
    border-radius:50%;
    overflow:hidden;
    border:4px solid #3498db;
    transition:.4s;
}

.main-photo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.main-photo:hover{
    transform:translateY(-10px);
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.name{
    display:flex;
    justify-content:space-between;
    margin-top:15px;
    font-weight:bold;
}

hr{
    margin:15px 0;
}

/* Small Photos */

.gallery{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}

.gallery img{
    width:65px;
    height:65px;
    object-fit:cover;
    border-radius:8px;
    border:2px solid #3498db;
    transition:.4s;
    cursor:pointer;
}

.gallery img:hover{
    transform:scale(1.4);
    box-shadow:0 8px 15px rgba(0,0,0,0.3);
}

/* Details */

.details p{
    margin:8px 0;
    padding-bottom:5px;
    border-bottom:1px solid #ddd;
}

</style>
</head>

<body>

<div class="card">

    <div class="title">ID CARD</div>

    <div class="main-photo">
        <img src="images.jpg" alt="Profile">
    </div>

    <div class="name">
        <span>Last Name: Khadka</span>
        <span>First Name: Mohan</span>
    </div>

    <hr>

    <!-- Small Photos Left to Right -->

    <div class="gallery">
        <img src="images.jpg" alt="">
        <img src="images.jpg" alt="">
        <img src="images.jpg" alt="">
        <img src="images.jpg" alt="">
    </div>

    <div class="details">
        <p><b>ID:</b> 001</p>
        <p><b>Faculty:</b> BCA</p>
        <p><b>Semester:</b> 4th</p>
        <p><b>Email:</b> mohankhadka7477@gmail.com</p>
        <p><b>Phone:</b> 98XXXXXXXX</p>
    </div>

</div>

</body>
</html>
